name: E2E Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * *'  # Nightly at 6am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tier1:
    name: Tier 1 (Mechanical)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mbrain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.12
      - run: bun install
      - name: Run Tier 1 E2E tests
        run: bun test test/e2e/mechanical.test.ts test/e2e/mcp.test.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mbrain_test
      - name: HTTP OAuth smoke
        run: bun run smoke:http-oauth
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mbrain_test

  tier2:
    name: Tier 2 (LLM Skills)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: tier1
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mbrain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.12
      - run: bun install
      - name: Install OpenClaw
        run: npm install -g openclaw@2026.4.9
      - name: Configure OpenClaw MCP
        run: |
          mkdir -p ~/.openclaw
          cat > ~/.openclaw/config.json << 'EOF'
          {
            "mcpServers": {
              "mbrain": {
                "command": "bun",
                "args": ["run", "src/cli.ts", "serve"],
                "env": {
                  "DATABASE_URL": "${{ env.DATABASE_URL }}"
                }
              }
            }
          }
          EOF
      - name: Run Tier 2 skill tests
        run: bun test test/e2e/skills.test.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mbrain_test
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
