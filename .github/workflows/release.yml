name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: mbrain-darwin-arm64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: mbrain-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.12
      - run: bun install
      - name: Typecheck
        run: bunx tsc --noEmit --pretty false
      - run: bun run test
        env:
          # PGLite WASM schema init regularly needs >20s on macOS runners.
          TEST_TIMEOUT_MS: 60000
      - run: bun build --compile --target=${{ matrix.target }} --outfile bin/${{ matrix.artifact }} src/cli.ts
      - name: Repair macOS compiled signature
        if: matrix.os == 'macos-latest'
        run: |
          codesign --remove-signature bin/${{ matrix.artifact }} || true
          codesign --sign - --force bin/${{ matrix.artifact }}
      - name: Smoke compiled binary
        run: bin/${{ matrix.artifact }} --version
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.artifact }}

  # Both smokes run sequentially against the same ephemeral service database:
  # the runtime smoke requires an empty DB, applies the schema, and deletes its
  # own page before exiting; the OAuth smoke only touches rows keyed on its own
  # client name. Keep that ordering if this job changes.
  smoke:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mbrain_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.12
      - run: bun install
      - name: Postgres runtime smoke
        run: bun run smoke:postgres-runtime
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mbrain_smoke
      - name: HTTP OAuth smoke
        run: bun run smoke:http-oauth
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mbrain_smoke

  release:
    needs: [build, smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            artifacts/mbrain-darwin-arm64/mbrain-darwin-arm64
            artifacts/mbrain-linux-x64/mbrain-linux-x64
          generate_release_notes: true
