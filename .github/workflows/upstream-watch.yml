name: Upstream Watch

# Read-only fork drift watch. Runs on a fresh master checkout, adds the
# upstream remote in fetch-only shape, then opens or closes a single tracking
# issue based on whether upstream/master has moved ahead of the fork.

on:
  schedule:
    - cron: '35 13 * * 1,4'  # Monday + Thursday 13:35 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-master
  cancel-in-progress: true

jobs:
  upstream-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure upstream remote read-only
        run: |
          git remote add upstream https://github.com/garrytan/gbrain.git
          git remote set-url --push upstream DISABLED

      - name: Run read-only upstream watch
        id: watch
        run: |
          bash scripts/upstream-watch.sh \
            --fetch \
            --summary-file "$RUNNER_TEMP/upstream-watch-summary.md" \
            --github-output "$GITHUB_OUTPUT"

      - name: Publish upstream watch summary
        if: steps.watch.outcome == 'success'
        run: cat "$RUNNER_TEMP/upstream-watch-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Sync upstream drift issue
        if: steps.watch.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ steps.watch.outputs.issue_title }}
          REPO: ${{ github.repository }}
          SUMMARY_FILE: ${{ runner.temp }}/upstream-watch-summary.md
          UPSTREAM_MOVED: ${{ steps.watch.outputs.upstream_moved }}
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/$REPO"
          search_api="https://api.github.com/search/issues"

          gh_api() {
            curl -fsS \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$@"
          }

          search_issue_number() {
            local state="$1"
            local query
            local encoded_query
            query="repo:$REPO is:issue state:$state in:title \"$ISSUE_TITLE\""
            encoded_query="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))' "$query")"
            gh_api "$search_api?q=$encoded_query&per_page=10" | jq -r \
              --arg title "$ISSUE_TITLE" '.items | map(select(.title == $title)) | .[0].number // empty'
          }

          open_issue="$(search_issue_number open)"
          closed_issue="$(search_issue_number closed)"

          if [ "$UPSTREAM_MOVED" = "true" ]; then
            payload="$(jq -n --arg title "$ISSUE_TITLE" --rawfile body "$SUMMARY_FILE" '{title: $title, body: $body}')"
            if [ -n "$open_issue" ]; then
              gh_api -X PATCH "$api/issues/$open_issue" -d "$payload" >/dev/null
              echo "Updated upstream drift issue #$open_issue"
            elif [ -n "$closed_issue" ]; then
              reopen_payload="$(jq -n --rawfile body "$SUMMARY_FILE" '{state: "open", body: $body}')"
              gh_api -X PATCH "$api/issues/$closed_issue" -d "$reopen_payload" >/dev/null
              echo "Reopened upstream drift issue #$closed_issue"
            else
              gh_api -X POST "$api/issues" -d "$payload" >/dev/null
              echo "Opened upstream drift issue"
            fi
          elif [ -n "$open_issue" ]; then
            close_payload="$(jq -n --rawfile body "$SUMMARY_FILE" '{state: "closed", body: $body}')"
            gh_api -X PATCH "$api/issues/$open_issue" -d "$close_payload" >/dev/null
            echo "Closed upstream drift issue #$open_issue"
          else
            echo "No upstream drift and no open issue to close"
          fi
